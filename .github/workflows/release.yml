name: Publish

on:
  push:
    tags:
      - 1.*

jobs:
  publish-packer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Choco pack
        shell: pwsh
        run: choco pack .\packer.nuspec

      - name: Test 64 bit
        run: .\test.ps1 -cpu x64
      - name: Test 32 bit
        run: .\test.ps1 -cpu x86

      - name: Add Choco API Key
        shell: pwsh
        run: choco apikey --key "${{secrets.CHOCO_API_KEY}}" --source https://push.chocolatey.org/

      - name: Publish (noop)
        shell: pwsh
        run: choco push --source https://push.chocolatey.org/
