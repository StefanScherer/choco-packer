name: AU Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

jobs:
  update:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install AU module
        shell: pwsh
        run: Install-Module au -Scope CurrentUser -Force

      - name: Update package files
        shell: pwsh
        run: |
          $workspace = (Get-Location).Path
          $auPath = Join-Path $env:RUNNER_TEMP 'packer'
          if (Test-Path $auPath) {
            Remove-Item -Path $auPath -Force -Recurse
          }
          New-Item -ItemType Junction -Path $auPath -Target $workspace | Out-Null
          Push-Location $auPath
          try {
            .\update.ps1
          } finally {
            Pop-Location
            Remove-Item -Path $auPath -Force
          }

      - name: Detect changes
        id: changes
        shell: pwsh
        run: |
          if (git status --porcelain) {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Choco pack
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: choco pack .\packer.nuspec

      - name: Test 64 bit
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: .\test.ps1 -cpu x64

      - name: Test 32 bit
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: .\test.ps1 -cpu x86

      - name: Add Choco API Key
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: choco apikey --key "${{ secrets.CHOCO_API_KEY }}" --source https://push.chocolatey.org/

      - name: Publish package
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          Get-ChildItem .\packer.*.nupkg | ForEach-Object {
            choco push --source https://push.chocolatey.org/ --skip-duplicate $_.FullName
          }
