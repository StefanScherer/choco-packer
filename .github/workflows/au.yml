name: AU Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AU module
        shell: pwsh
        run: Install-Module au -Scope CurrentUser -Force

      - name: Update package files
        shell: pwsh
        run: .\update.ps1

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/au-update
          title: "chore: automated package update"
          commit-message: "chore: automated package update"
          body: |
            Automated update generated by Chocolatey AU.
