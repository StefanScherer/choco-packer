name: AU Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install AU module
        shell: pwsh
        run: Install-Module au -Scope CurrentUser -Force

      - name: Update package files
        shell: pwsh
        run: |
          $workspace = (Get-Location).Path
          $auPath = Join-Path $env:RUNNER_TEMP 'packer'
          if (Test-Path $auPath) {
            Remove-Item -Path $auPath -Force -Recurse
          }
          New-Item -ItemType Junction -Path $auPath -Target $workspace | Out-Null
          Push-Location $auPath
          try {
            .\update.ps1
          } finally {
            Pop-Location
            Remove-Item -Path $auPath -Force
          }

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/au-update
          title: "chore: automated package update"
          commit-message: "chore: automated package update"
          body: |
            Automated update generated by Chocolatey AU.
